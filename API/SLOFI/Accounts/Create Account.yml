info:
  name: Create Account
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/accounts"
  body:
    type: json
    data: |-
      {
        "name": "Efectivo",
        "type": "cash",
        "balance": 5000,
        "currency": "MXN"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
